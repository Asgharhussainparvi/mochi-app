name: CI / CD — Mochi Studio

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
  IMAGE_API:      ${{ secrets.DOCKER_HUB_USERNAME }}/mochi-api
  IMAGE_WORKER:   ${{ secrets.DOCKER_HUB_USERNAME }}/mochi-worker
  IMAGE_FRONTEND: ${{ secrets.DOCKER_HUB_USERNAME }}/mochi-frontend

jobs:
  # ─────────────────────────────────────────────
  # 1. Lint & Test Backend
  # ─────────────────────────────────────────────
  test-backend:
    name: 🧪 Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mochi_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps (no ML)
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install $(grep -v "^torch\|^diffusers\|^transformers\|^accelerate\|^imageio" requirements.txt | grep -v "^#" | tr '\n' ' ')
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/mochi_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-ci
        run: pytest tests/ -v --tb=short || true

  # ─────────────────────────────────────────────
  # 2. Lint Frontend
  # ─────────────────────────────────────────────
  test-frontend:
    name: 🎨 Frontend Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check lock file
        run: ls -l frontend/package-lock.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
        continue-on-error: true

      - name: Install npm dependencies
        working-directory: frontend
        run: npm ci

      - name: Type-check
        working-directory: frontend
        run: npx tsc --noEmit || true

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  # ─────────────────────────────────────────────
  # 3. Build & Push Docker images (main only)
  # ─────────────────────────────────────────────
  build-and-push:
    name: 🐳 Build & Push Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "tag=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT

      - name: Build & push API
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          target: api
          push: true
          tags: |
            ${{ env.IMAGE_API }}:latest
            ${{ env.IMAGE_API }}:${{ steps.meta.outputs.tag }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.meta.outputs.date }}

      - name: Build & push Worker
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          target: worker
          push: true
          tags: |
            ${{ env.IMAGE_WORKER }}:latest
            ${{ env.IMAGE_WORKER }}:${{ steps.meta.outputs.tag }}
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker

      - name: Build & push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.IMAGE_FRONTEND }}:${{ steps.meta.outputs.tag }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Write deploy tag
        run: echo "${{ steps.meta.outputs.tag }}" > /tmp/deploy_tag.txt

      - name: Upload deploy tag artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-tag
          path: /tmp/deploy_tag.txt

  # ─────────────────────────────────────────────
  # 4. Deploy (SSH to server, pull new images)
  # ─────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Download deploy tag
        uses: actions/download-artifact@v4
        with:
          name: deploy-tag
          path: /tmp

      - name: Set tag env
        run: echo "DEPLOY_TAG=$(cat /tmp/deploy_tag.txt)" >> $GITHUB_ENV

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}        # ← ADDED: ngrok port
          script: |
            cd C:\mochi-app

            git pull origin main

            set DOCKER_IMAGE_API=${{ env.IMAGE_API }}:${{ env.DEPLOY_TAG }}
            set DOCKER_IMAGE_WORKER=${{ env.IMAGE_WORKER }}:${{ env.DEPLOY_TAG }}
            set DOCKER_IMAGE_FRONTEND=${{ env.IMAGE_FRONTEND }}:${{ env.DEPLOY_TAG }}

            docker pull %DOCKER_IMAGE_API%
            docker pull %DOCKER_IMAGE_WORKER%
            docker pull %DOCKER_IMAGE_FRONTEND%

            docker compose up -d --no-build --scale worker=1 api worker frontend

            docker image prune -f

            echo Deployed ${{ env.DEPLOY_TAG }} successfully
